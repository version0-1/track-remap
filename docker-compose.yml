services:
  # Track remap (image → path → activity file, etc.). Example: docker compose run --rm track-remap npm run build
  # Demo: docker compose up -d → http://localhost:5000/demo.html
  track-remap:
    build: ./track-remap
    volumes:
      - ./track-remap:/app
    working_dir: /app
    ports:
      - "5000:5000"
    command: ["sh", "-c", "npm install && npm run build && npm run demo"]
